<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catatan Keuangan</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='16' fill='%23f0abfc'/><text x='32' y='44' text-anchor='middle' font-size='36'>💰</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0d6f5;   /* lavender desktop */
      --win-bg:    #fefce8;   /* cream window body */
      --titlebar:  #d9f99d;   /* lime green title bar */
      --border:    #1a1a1a;   /* thick black border */
      --shadow:    4px 4px 0 #1a1a1a;
      --dot-red:   #f87171;
      --dot-yellow:#fbbf24;
      --dot-green: #a3e635;
      --accent:    #7c3aed;   /* purple accent */
      --accent2:   #f472b6;   /* pink */
      --accent3:   #34d399;   /* mint */
      --text:      #1a1a1a;
      --muted:     #6b7280;
      --green-txt: #15803d;
      --red-txt:   #dc2626;
      --blue-txt:  #1d4ed8;
      --input-bg:  #ffffff;
      --radius:    10px;
    }

    body {
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle, #d8b4fe33 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
      padding: 20px 12px 60px;
      color: var(--text);
    }

    /* ── PAGE TITLE ── */
    .page-title {
      text-align: center;
      margin-bottom: 18px;
    }
    .page-title h1 {
      font-size: 1.6rem; font-weight: 700;
      color: var(--accent);
      text-shadow: 2px 2px 0 #1a1a1a;
      letter-spacing: -0.5px;
    }
    .page-title p { font-size: .82rem; color: var(--muted); margin-top: 2px; }

    /* ── WINDOW ── */
    .container { max-width: 620px; margin: 0 auto; }

    .win {
      background: var(--win-bg);
      border: 2.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .win-bar {
      background: var(--titlebar);
      border-bottom: 2.5px solid var(--border);
      padding: 7px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .win-bar-left { display: flex; align-items: center; gap: 7px; }
    .win-dots { display: flex; gap: 5px; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--border);
    }
    .dot.red    { background: var(--dot-red); }
    .dot.yellow { background: var(--dot-yellow); }
    .dot.green  { background: var(--dot-green); }
    .win-title {
      font-size: .8rem; font-weight: 700; color: var(--text);
    }

    /* toolbar pill (address bar style) */
    .win-pill {
      background: #fff; border: 2px solid var(--border);
      border-radius: 20px; padding: 2px 10px;
      font-size: .72rem; font-weight: 600; color: var(--muted);
      flex: 1; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .win-body { padding: 14px; }

    /* ── SUMMARY ── */
    .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .sum-card {
      background: #fff;
      border: 2.5px solid var(--border);
      border-radius: 10px;
      box-shadow: 3px 3px 0 var(--border);
      padding: 12px 8px; text-align: center;
    }
    .sum-card .s-label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); margin-bottom: 5px;
    }
    .sum-card .s-amount { font-size: .95rem; font-weight: 700; word-break: break-all; }
    .sum-card.saldo  .s-amount { color: var(--blue-txt); }
    .sum-card.masuk  .s-amount { color: var(--green-txt); }
    .sum-card.keluar .s-amount { color: var(--red-txt); }

    /* ── TOGGLE TYPE ── */
    .toggle-type {
      display: flex;
      background: #f3f4f6;
      border: 2px solid var(--border);
      border-radius: 30px;
      padding: 3px;
      margin-bottom: 14px;
      gap: 4px;
    }
    .toggle-type button {
      flex: 1; padding: 7px; border: 2px solid transparent;
      border-radius: 24px; background: transparent;
      font-size: .82rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .15s; color: var(--muted);
    }
    .toggle-type button.active-masuk {
      background: #dcfce7; border-color: var(--border);
      color: var(--green-txt); box-shadow: 2px 2px 0 var(--border);
    }
    .toggle-type button.active-keluar {
      background: #fee2e2; border-color: var(--border);
      color: var(--red-txt); box-shadow: 2px 2px 0 var(--border);
    }

    /* ── FORM ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .form-group label { font-size: .75rem; font-weight: 700; color: var(--text); }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 10px;
      font-size: .85rem;
      font-family: inherit;
      width: 100%; outline: none;
      transition: box-shadow .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      box-shadow: 3px 3px 0 var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    select option { background: #fff; }

    /* ── BUTTONS ── */
    .btn {
      background: #fff; border: 2.5px solid var(--border);
      border-radius: 8px; padding: 7px 14px;
      font-size: .8rem; font-weight: 700; font-family: inherit;
      cursor: pointer; box-shadow: 3px 3px 0 var(--border);
      transition: all .1s; color: var(--text);
    }
    .btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--border); }
    .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--border); }

    .btn-submit {
      width: 100%; padding: 10px;
      border: 2.5px solid var(--border);
      border-radius: 10px;
      font-size: .9rem; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 4px;
      box-shadow: 3px 3px 0 var(--border);
      transition: all .1s;
    }
    .btn-submit:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--border); }
    .btn-submit.masuk  { background: #dcfce7; color: var(--green-txt); }
    .btn-submit.keluar { background: #fee2e2; color: var(--red-txt); }

    /* ── FILTER ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input {
      background: var(--input-bg); border: 2px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 7px 10px;
      font-size: .8rem; font-family: inherit;
      flex: 1; min-width: 110px; outline: none;
    }
    .filter-bar select:focus, .filter-bar input:focus { box-shadow: 2px 2px 0 var(--accent); }

    .filter-date-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
    .filter-date-row label { font-size: .75rem; font-weight: 700; white-space: nowrap; }
    .filter-date-row input[type=date] {
      background: var(--input-bg); border: 2px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 7px 10px;
      font-size: .8rem; font-family: inherit;
      flex: 1; min-width: 120px; outline: none;
    }

    .filter-actions { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .filter-info { font-size: .75rem; color: var(--muted); flex: 1; font-weight: 600; }

    /* ── TX LIST ── */
    .empty { text-align: center; color: var(--muted); padding: 24px 0; font-size: .85rem; }

    .tx-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 8px;
      border-bottom: 2px dashed #e5e7eb;
      transition: background .12s;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: #faf5ff; border-radius: 8px; }

    .tx-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
      border: 2px solid var(--border);
      box-shadow: 2px 2px 0 var(--border);
    }
    .tx-icon.masuk  { background: #dcfce7; }
    .tx-icon.keluar { background: #fee2e2; }

    .tx-info { flex: 1; min-width: 0; }
    .tx-info .tx-cat  { font-size: .85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-info .tx-meta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .tx-info .tx-note { font-size: .72rem; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-right .tx-amount { font-size: .88rem; font-weight: 700; }
    .tx-right .tx-amount.masuk  { color: var(--green-txt); }
    .tx-right .tx-amount.keluar { color: var(--red-txt); }
    .tx-right .tx-del {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: .72rem; margin-top: 3px; display: block; text-align: right;
    }
    .tx-del:hover { color: var(--red-txt); text-decoration: underline; }

    /* ── CHART ── */
    .chart-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .chart-tab {
      background: #fff; border: 2px solid var(--border);
      border-radius: 20px; padding: 5px 14px;
      font-size: .78rem; font-weight: 700; font-family: inherit;
      cursor: pointer; color: var(--muted);
      box-shadow: 2px 2px 0 var(--border); transition: all .1s;
    }
    .chart-tab.active {
      background: var(--accent); color: #fff;
      box-shadow: 3px 3px 0 var(--border);
    }
    .chart-tab:hover:not(.active) { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--border); }

    .chart-wrap { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .chart-legend { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 3px;
      border: 2px solid var(--border); flex-shrink: 0;
    }
    .legend-info { flex: 1; min-width: 0; }
    .legend-cat { font-size: .8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .legend-amt { font-size: .7rem; color: var(--muted); }
    .legend-pct { font-size: .75rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }

    .chart-empty { text-align: center; color: var(--muted); padding: 20px 0; font-size: .82rem; }

    /* ── SECTION LABEL ── */
    .sec-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 8px;
    }

    /* ── LIST TOP ACTIONS ── */
    .list-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .list-actions h3 { font-size: .85rem; font-weight: 700; }

    @media (max-width: 400px) {
      .summary { grid-template-columns: 1fr; }
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- PAGE TITLE -->
  <div class="page-title">
    <h1>💰 Catatan Keuangan</h1>
    <p>Kelola pemasukan & pengeluaran dengan mudah</p>
  </div>

  <!-- SUMMARY WINDOW -->
  <div class="win">
    <div class="win-bar">
      <div class="win-bar-left">
        <div class="win-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <span class="win-title">Ringkasan Keuangan</span>
      </div>
      <div class="win-pill">dompet-utama.json</div>
    </div>
    <div class="win-body">
      <div class="summary">
        <div class="sum-card saldo">
          <div class="s-label">💾 Saldo</div>
          <div class="s-amount" id="sum-saldo">Rp 0</div>
        </div>
        <div class="sum-card masuk">
          <div class="s-label">▲ Masuk</div>
          <div class="s-amount" id="sum-masuk">Rp 0</div>
        </div>
        <div class="sum-card keluar">
          <div class="s-label">▼ Keluar</div>
          <div class="s-amount" id="sum-keluar">Rp 0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- GRAFIK WINDOW -->
  <div class="win">
    <div class="win-bar">
      <div class="win-bar-left">
        <div class="win-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <span class="win-title">📊 Grafik Pengeluaran</span>
      </div>
      <div class="win-pill">chart-view.exe</div>
    </div>
    <div class="win-body">
      <div class="chart-tabs">
        <button class="chart-tab active" id="tab-donut" onclick="switchChart('donut')">🍩 Donut</button>
        <button class="chart-tab" id="tab-bar"   onclick="switchChart('bar')">📊 Bar</button>
      </div>
      <div id="chart-content"></div>
    </div>
  </div>

  <!-- FORM WINDOW -->
  <div class="win">
    <div class="win-bar">
      <div class="win-bar-left">
        <div class="win-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <span class="win-title">✏️ Tambah Transaksi</span>
      </div>
      <div class="win-pill">new-transaction.form</div>
    </div>
    <div class="win-body">

      <div class="toggle-type">
        <button id="btn-masuk" class="active-masuk" onclick="setType('masuk')">▲ Pemasukan</button>
        <button id="btn-keluar" onclick="setType('keluar')">▼ Pengeluaran</button>
      </div>

      <div class="grid2">
        <div class="form-group">
          <label>📅 Tanggal</label>
          <input type="date" id="f-tanggal" />
        </div>
        <div class="form-group">
          <label>💵 Jumlah (Rp)</label>
          <input type="number" id="f-jumlah" placeholder="0" min="0" />
        </div>
      </div>

      <div class="form-group">
        <label>🏷️ Kategori</label>
        <select id="f-kategori"></select>
      </div>

      <div class="form-group">
        <label>📝 Catatan (opsional)</label>
        <textarea id="f-catatan" placeholder="Tulis catatan..."></textarea>
      </div>

      <button class="btn-submit masuk" id="btn-submit" onclick="tambahTransaksi()">+ Tambah Pemasukan</button>
    </div>
  </div>

  <!-- LIST WINDOW -->
  <div class="win">
    <div class="win-bar">
      <div class="win-bar-left">
        <div class="win-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <span class="win-title">📋 Riwayat Transaksi</span>
      </div>
      <div class="win-pill">transactions.log</div>
    </div>
    <div class="win-body">

      <div class="list-actions">
        <h3>Daftar Transaksi</h3>
        <div style="display:flex;gap:6px;">
          <button class="btn" onclick="eksporCSV()">⬇ CSV</button>
          <button class="btn" onclick="hapusSemua()" style="color:#dc2626;">🗑</button>
        </div>
      </div>

      <!-- Filter -->
      <div class="filter-bar">
        <select id="filter-type" onchange="renderList()">
          <option value="">Semua Jenis</option>
          <option value="masuk">Pemasukan</option>
          <option value="keluar">Pengeluaran</option>
        </select>
        <select id="filter-cat" onchange="renderList()">
          <option value="">Semua Kategori</option>
        </select>
      </div>
      <div class="filter-date-row">
        <label>Dari</label>
        <input type="date" id="filter-dari" onchange="renderList()" />
        <label>Sampai</label>
        <input type="date" id="filter-sampai" onchange="renderList()" />
      </div>
      <div class="filter-actions">
        <span class="filter-info" id="filter-info"></span>
        <button class="btn" onclick="resetFilter()">↺ Reset</button>
      </div>

      <div id="tx-list"></div>
    </div>
  </div>

</div>

<script>
  const CAT = {
    masuk:  ['Gaji', 'Freelance', 'Bonus', 'Investasi', 'Hadiah', 'Lainnya'],
    keluar: ['Makan & Minum', 'Transportasi', 'Belanja', 'Tagihan', 'Hiburan',
             'Kesehatan', 'Pendidikan', 'Tabungan', 'Lainnya'],
  };
  const ICON = {
    masuk:  { 'Gaji':'💼','Freelance':'🖥️','Bonus':'🎁','Investasi':'📈','Hadiah':'🎀','Lainnya':'💵' },
    keluar: { 'Makan & Minum':'🍜','Transportasi':'🚗','Belanja':'🛍️','Tagihan':'📄',
              'Hiburan':'🎮','Kesehatan':'💊','Pendidikan':'📚','Tabungan':'🏦','Lainnya':'💸' },
  };

  let data = JSON.parse(localStorage.getItem('keuangan_data') || '[]');
  let tipe = 'masuk';

  function simpan() { localStorage.setItem('keuangan_data', JSON.stringify(data)); }
  function fmt(n)   { return 'Rp ' + Math.abs(n).toLocaleString('id-ID'); }

  // ── GRAFIK ────────────────────────────────────────────
  const PALETTE = [
    '#f87171','#fb923c','#facc15','#4ade80','#34d399',
    '#60a5fa','#a78bfa','#f472b6','#94a3b8','#2dd4bf',
  ];
  let chartMode = 'donut';

  function switchChart(mode) {
    chartMode = mode;
    document.getElementById('tab-donut').className = 'chart-tab' + (mode==='donut'?' active':'');
    document.getElementById('tab-bar').className   = 'chart-tab' + (mode==='bar'  ?' active':'');
    renderChart();
  }

  function renderChart() {
    const keluar = data.filter(d => d.tipe === 'keluar');
    const el = document.getElementById('chart-content');
    if (!keluar.length) {
      el.innerHTML = '<div class="chart-empty">✨ Belum ada data pengeluaran</div>';
      return;
    }
    const map = {};
    keluar.forEach(d => { map[d.kategori] = (map[d.kategori]||0) + d.jumlah; });
    const total = Object.values(map).reduce((s,v)=>s+v,0);
    const items = Object.entries(map).sort((a,b)=>b[1]-a[1])
      .map(([cat,val],i) => ({cat, val, pct: val/total, color: PALETTE[i%PALETTE.length]}));
    chartMode === 'donut' ? renderDonut(el,items,total) : renderBar(el,items,total);
  }

  function renderDonut(el, items, total) {
    const SIZE=180, CX=90, CY=90, R=68, RI=40, GAP=0.04;
    let paths='';
    if (items.length===1) {
      paths=`<circle cx="${CX}" cy="${CY}" r="${R}" fill="${items[0].color}" stroke="#1a1a1a" stroke-width="2"/>
             <circle cx="${CX}" cy="${CY}" r="${RI}" fill="#fefce8" stroke="#1a1a1a" stroke-width="1.5"/>`;
    } else {
      let angle=-Math.PI/2;
      items.forEach(item=>{
        const sweep=item.pct*2*Math.PI-GAP; if(sweep<=0)return;
        const a1=angle+GAP/2, a2=a1+sweep, lg=sweep>Math.PI?1:0;
        const x1o=CX+R*Math.cos(a1), y1o=CY+R*Math.sin(a1);
        const x2o=CX+R*Math.cos(a2), y2o=CY+R*Math.sin(a2);
        const x1i=CX+RI*Math.cos(a2), y1i=CY+RI*Math.sin(a2);
        const x2i=CX+RI*Math.cos(a1), y2i=CY+RI*Math.sin(a1);
        const d=`M${x1o.toFixed(1)},${y1o.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2o.toFixed(1)},${y2o.toFixed(1)} L${x1i.toFixed(1)},${y1i.toFixed(1)} A${RI},${RI} 0 ${lg},0 ${x2i.toFixed(1)},${y2i.toFixed(1)} Z`;
        paths+=`<path d="${d}" fill="${item.color}" stroke="#1a1a1a" stroke-width="1.5"/>`;
        angle+=item.pct*2*Math.PI;
      });
    }
    const fmtS=n=>{
      if(n>=1e9)return'Rp'+(n/1e9).toFixed(1)+'M';
      if(n>=1e6)return'Rp'+(n/1e6).toFixed(1)+'jt';
      if(n>=1e3)return'Rp'+(n/1e3).toFixed(0)+'rb';
      return'Rp'+n;
    };
    const leg=items.map(item=>`
      <div class="legend-item">
        <div class="legend-dot" style="background:${item.color}"></div>
        <div class="legend-info">
          <div class="legend-cat">${escHtml(item.cat)}</div>
          <div class="legend-amt">${fmt(item.val)}</div>
        </div>
        <div class="legend-pct">${(item.pct*100).toFixed(1)}%</div>
      </div>`).join('');
    el.innerHTML=`
      <div class="chart-wrap">
        <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" style="flex-shrink:0;display:block">
          ${paths}
          <text x="${CX}" y="${CY-8}" text-anchor="middle" fill="#6b7280" font-size="9" font-family="Space Grotesk,sans-serif" font-weight="600">Total</text>
          <text x="${CX}" y="${CY+8}" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="700" font-family="Space Grotesk,sans-serif">${fmtS(total)}</text>
        </svg>
        <div class="chart-legend">${leg}</div>
      </div>`;
  }

  function renderBar(el, items, total) {
    const rows=items.map(item=>{
      const w=(item.pct*100).toFixed(1);
      return`<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:.8rem;">
          <span style="font-weight:700;display:flex;align-items:center;gap:6px;">
            <span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:${item.color};border:2px solid #1a1a1a;"></span>
            ${escHtml(item.cat)}
          </span>
          <span style="color:#6b7280;font-size:.72rem;">${fmt(item.val)} <b style="color:#7c3aed">${w}%</b></span>
        </div>
        <div style="background:#f3f4f6;border:2px solid #1a1a1a;border-radius:20px;height:14px;overflow:hidden;">
          <div style="width:${w}%;background:${item.color};height:100%;border-radius:20px;"></div>
        </div>
      </div>`;
    }).join('');
    el.innerHTML=`<div>${rows}</div>`;
  }

  // ── INIT ──────────────────────────────────────────────
  function init() {
    document.getElementById('f-tanggal').value = new Date().toISOString().split('T')[0];
    setType('masuk'); updateSummary(); renderChart(); renderList();
  }

  function resetFilter() {
    ['filter-type','filter-cat','filter-dari','filter-sampai'].forEach(id=>document.getElementById(id).value='');
    renderList();
  }

  function setType(t) {
    tipe=t;
    document.getElementById('btn-masuk').className  = t==='masuk'  ? 'active-masuk'  : '';
    document.getElementById('btn-keluar').className = t==='keluar' ? 'active-keluar' : '';
    const btn=document.getElementById('btn-submit');
    btn.textContent = t==='masuk' ? '+ Tambah Pemasukan' : '+ Tambah Pengeluaran';
    btn.className='btn-submit '+t;
    document.getElementById('f-kategori').innerHTML = CAT[t].map(c=>`<option>${c}</option>`).join('');
    renderFilterCat();
  }

  function renderFilterCat() {
    const all=[...new Set(data.map(d=>d.kategori))];
    const sel=document.getElementById('filter-cat');
    const cur=sel.value;
    sel.innerHTML='<option value="">Semua Kategori</option>'+
      all.map(c=>`<option ${c===cur?'selected':''}>${c}</option>`).join('');
  }

  function tambahTransaksi() {
    const tanggal=document.getElementById('f-tanggal').value;
    const jumlah=parseFloat(document.getElementById('f-jumlah').value);
    const kategori=document.getElementById('f-kategori').value;
    const catatan=document.getElementById('f-catatan').value.trim();
    if(!tanggal) return alert('Pilih tanggal terlebih dahulu.');
    if(!jumlah||jumlah<=0) return alert('Masukkan jumlah yang valid.');
    data.unshift({id:Date.now(),tipe,tanggal,jumlah,kategori,catatan});
    simpan();
    document.getElementById('f-jumlah').value='';
    document.getElementById('f-catatan').value='';
    updateSummary(); renderChart(); renderList(); renderFilterCat();
  }

  function hapusItem(id) {
    if(!confirm('Hapus transaksi ini?')) return;
    data=data.filter(d=>d.id!==id);
    simpan(); updateSummary(); renderChart(); renderList(); renderFilterCat();
  }
  function hapusSemua() {
    if(!data.length) return;
    if(!confirm('Hapus SEMUA transaksi? Tindakan ini tidak bisa dibatalkan.')) return;
    data=[]; simpan(); updateSummary(); renderChart(); renderList(); renderFilterCat();
  }

  function updateSummary() {
    const masuk=data.filter(d=>d.tipe==='masuk').reduce((s,d)=>s+d.jumlah,0);
    const keluar=data.filter(d=>d.tipe==='keluar').reduce((s,d)=>s+d.jumlah,0);
    const saldo=masuk-keluar;
    document.getElementById('sum-masuk').textContent=fmt(masuk);
    document.getElementById('sum-keluar').textContent=fmt(keluar);
    const el=document.getElementById('sum-saldo');
    el.textContent=(saldo<0?'-':'')+fmt(saldo);
    el.style.color=saldo<0?'var(--red-txt)':'var(--blue-txt)';
  }

  function renderList() {
    const fType=document.getElementById('filter-type').value;
    const fCat=document.getElementById('filter-cat').value;
    const fDari=document.getElementById('filter-dari').value;
    const fSampai=document.getElementById('filter-sampai').value;
    let list=data.filter(d=>{
      if(fType&&d.tipe!==fType) return false;
      if(fCat&&d.kategori!==fCat) return false;
      if(fDari&&d.tanggal<fDari) return false;
      if(fSampai&&d.tanggal>fSampai) return false;
      return true;
    });
    const hasFilter=fType||fCat||fDari||fSampai;
    document.getElementById('filter-info').textContent=hasFilter
      ?`${list.length} dari ${data.length} transaksi`:`${data.length} transaksi`;
    const el=document.getElementById('tx-list');
    if(!list.length){
      el.innerHTML='<div class="empty">✨ Belum ada transaksi 📭</div>'; return;
    }
    el.innerHTML=list.map(d=>{
      const icon=(ICON[d.tipe]&&ICON[d.tipe][d.kategori])||(d.tipe==='masuk'?'💵':'💸');
      const tgl=new Date(d.tanggal+'T00:00:00').toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
      return`<div class="tx-item">
        <div class="tx-icon ${d.tipe}">${icon}</div>
        <div class="tx-info">
          <div class="tx-cat">${d.kategori}</div>
          <div class="tx-meta">${tgl}</div>
          ${d.catatan?`<div class="tx-note">${escHtml(d.catatan)}</div>`:''}
        </div>
        <div class="tx-right">
          <div class="tx-amount ${d.tipe}">${d.tipe==='masuk'?'+':'-'}${fmt(d.jumlah)}</div>
          <button class="tx-del" onclick="hapusItem(${d.id})">✕ hapus</button>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function eksporCSV() {
    if(!data.length) return alert('Belum ada transaksi untuk diekspor.');
    const fType=document.getElementById('filter-type').value;
    const fCat=document.getElementById('filter-cat').value;
    const fDari=document.getElementById('filter-dari').value;
    const fSampai=document.getElementById('filter-sampai').value;
    const hasFilter=fType||fCat||fDari||fSampai;
    const list=hasFilter?data.filter(d=>{
      if(fType&&d.tipe!==fType) return false;
      if(fCat&&d.kategori!==fCat) return false;
      if(fDari&&d.tanggal<fDari) return false;
      if(fSampai&&d.tanggal>fSampai) return false;
      return true;
    }):data;
    if(!list.length) return alert('Tidak ada transaksi yang cocok dengan filter aktif.');
    const BOM='\uFEFF';
    const header=['Tanggal','Jenis','Kategori','Jumlah (Rp)','Catatan'];
    const rows=list.map(d=>[d.tanggal,d.tipe==='masuk'?'Pemasukan':'Pengeluaran',csvEsc(d.kategori),d.jumlah,csvEsc(d.catatan||'')]);
    const csv=BOM+[header,...rows].map(r=>r.join(',')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`keuangan_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  function csvEsc(val){
    const s=String(val);
    if(/[,"\n\r]/.test(s)) return'"'+s.replace(/"/g,'""')+'"';
    return s;
  }

  init();
</script>
</body>
</html>
